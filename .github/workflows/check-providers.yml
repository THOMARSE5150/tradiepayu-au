name: Weekly provider check

on:
  schedule:
    # Every Monday at 2am UTC
    - cron: '0 2 * * 1'
  workflow_dispatch: # allow manual trigger

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run provider check
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        working-directory: site
        run: node scripts/check-providers.js

      - name: Commit and push if changed
        working-directory: site
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/providers.json src/data/site-meta.json scripts/change-log.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: weekly provider rate check $(date -u +%Y-%m-%d)"
            git push
          fi

      - name: Purge Cloudflare cache
        if: ${{ secrets.CF_API_TOKEN != '' }}
        run: |
          curl -s -X POST "https://api.cloudflare.com/client/v4/zones/${{ secrets.CF_ZONE_ID }}/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}' \
            | grep -q '"success":true' && echo "✓ Cloudflare cache purged" || echo "✗ Cache purge failed (check CF_API_TOKEN secret)"

      - name: Ping Google + Bing sitemaps
        run: |
          curl -s "https://www.google.com/ping?sitemap=https://tradiepayau.directory/sitemap.xml" -o /dev/null -w "Google ping: %{http_code}\n"
          curl -s "https://www.bing.com/ping?sitemap=https://tradiepayau.directory/sitemap.xml" -o /dev/null -w "Bing ping: %{http_code}\n"

      - name: IndexNow — notify Bing of updated URLs
        run: |
          curl -s -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json" \
            -d '{
              "host": "tradiepayau.directory",
              "key": "9cywg6a6kxcywvx9k5gnnftccut97f7q",
              "keyLocation": "https://tradiepayau.directory/9cywg6a6kxcywvx9k5gnnftccut97f7q.txt",
              "urlList": [
                "https://tradiepayau.directory/",
                "https://tradiepayau.directory/providers/zeller",
                "https://tradiepayau.directory/providers/square",
                "https://tradiepayau.directory/providers/stripe",
                "https://tradiepayau.directory/providers/tyro",
                "https://tradiepayau.directory/providers/shift4"
              ]
            }' \
            -w "IndexNow: %{http_code}\n" -o /dev/null
